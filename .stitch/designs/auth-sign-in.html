<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Academy Realtors | Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#262a31",
                        "inverse-surface": "#dfe2eb",
                        "outline-variant": "#3b494c",
                        "on-error-container": "#ffdad6",
                        "background": "#10141a",
                        "primary-container": "#00e5ff",
                        "primary-fixed-dim": "#00daf3",
                        "on-secondary-fixed-variant": "#384858",
                        "error": "#ffb4ab",
                        "primary-fixed": "#9cf0ff",
                        "on-secondary-container": "#a6b7ca",
                        "on-secondary-fixed": "#0c1d2b",
                        "on-primary-container": "#00626e",
                        "error-container": "#93000a",
                        "on-background": "#dfe2eb",
                        "tertiary-fixed-dim": "#bac7dd",
                        "on-tertiary-fixed": "#0f1c2c",
                        "on-tertiary-container": "#4d5a6c",
                        "tertiary-fixed": "#d6e3fa",
                        "primary": "#c3f5ff",
                        "on-secondary": "#223241",
                        "surface-container-lowest": "#0a0e14",
                        "on-surface-variant": "#bac9cc",
                        "inverse-on-surface": "#2d3137",
                        "outline": "#849396",
                        "surface-container-highest": "#31353c",
                        "secondary-fixed": "#d3e4f8",
                        "surface-bright": "#353940",
                        "secondary": "#b7c8db",
                        "on-primary-fixed-variant": "#004f58",
                        "on-primary": "#00363d",
                        "tertiary": "#e3edff",
                        "surface-dim": "#10141a",
                        "on-tertiary-fixed-variant": "#3b485a",
                        "on-tertiary": "#243142",
                        "on-surface": "#dfe2eb",
                        "surface-container-low": "#181c22",
                        "secondary-fixed-dim": "#b7c8db",
                        "tertiary-container": "#c4d1e7",
                        "surface-tint": "#00daf3",
                        "secondary-container": "#384858",
                        "on-primary-fixed": "#001f24",
                        "inverse-primary": "#006875",
                        "surface-variant": "#31353c",
                        "surface-container": "#1c2026",
                        "surface": "#10141a",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0a0e14;
            color: #f0f4f8;
            font-family: 'Manrope', sans-serif;
        }
        .tonal-transition {
            background: linear-gradient(to bottom, #0a0e14, #10141a);
        }
        .glass-panel {
            background: rgba(38, 42, 49, 0.8);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="antialiased">
<!-- TopAppBar suppressed for Transactional focus as per Shell Visibility Rules, 
         but technically requested in visual style. Applying minimal architectural shell. -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 w-full bg-[#0a0e14] font-['Manrope'] antialiased tracking-tight">
<div class="text-xl font-bold tracking-tighter text-[#f0f4f8]">Academy Realtors</div>
<div class="flex items-center space-x-8">
<span class="text-[#8e9fb1] hover:text-[#00e5ff] transition-colors duration-300 cursor-pointer">Help</span>
</div>
</header>
<main class="min-h-screen flex items-center justify-center pt-20 px-6">
<!-- Centered Focused Panel -->
<div class="w-full max-w-[440px] flex flex-col space-y-12">
<!-- Branding & Header Section -->
<div class="space-y-4">
<div class="w-12 h-[2px] bg-[#00e5ff]"></div>
<h1 class="text-[2.75rem] font-bold tracking-tight leading-tight text-[#f0f4f8]">
                    Welcome Back.
                </h1>
<p class="text-[#8e9fb1] text-lg font-light">
                    Enter your credentials to access the editorial repository.
                </p>
</div>
<!-- Form Section -->
<form class="space-y-10" onsubmit="return false;">
<div class="space-y-8">
<!-- Email Input -->
<div class="group relative">
<label class="block font-['Inter'] uppercase tracking-widest text-[0.6875rem] text-[#8e9fb1] mb-2 transition-colors group-focus-within:text-[#00e5ff]" for="email">
                            Email Address
                        </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-[#3b494c]/40 focus:border-[#00e5ff] focus:ring-0 px-0 py-3 text-[#f0f4f8] placeholder-[#3b494c] transition-all duration-300 outline-none" id="email" name="email" placeholder="architect@academy.com" type="email"/>
</div>
<!-- Password Input -->
<div class="group relative">
<div class="flex justify-between items-end mb-2">
<label class="block font-['Inter'] uppercase tracking-widest text-[0.6875rem] text-[#8e9fb1] transition-colors group-focus-within:text-[#00e5ff]" for="password">
                                Password
                            </label>
<a class="font-['Inter'] uppercase tracking-widest text-[0.625rem] text-[#8e9fb1] hover:text-[#00e5ff] transition-colors" href="#">
                                Forgot?
                            </a>
</div>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-[#3b494c]/40 focus:border-[#00e5ff] focus:ring-0 px-0 py-3 text-[#f0f4f8] placeholder-[#3b494c] transition-all duration-300 outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Section -->
<div class="space-y-6">
<button class="w-full h-14 bg-[#00e5ff] hover:bg-[#00daf3] text-[#001f24] font-bold tracking-tight rounded-[2px] transition-all duration-300 active:scale-[0.98] flex items-center justify-center space-x-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<div class="flex flex-col items-center space-y-4">
<a class="font-['Inter'] uppercase tracking-widest text-[0.6875rem] text-[#8e9fb1] hover:text-[#f0f4f8] transition-colors flex items-center group" href="#">
                            Don't have an account? <span class="text-[#00e5ff] ml-1.5 group-hover:underline underline-offset-4">Create one</span>
</a>
</div>
</div>
</form>
<!-- Reassurance Footer -->
<div class="pt-8 border-t border-[#3b494c]/10 flex items-start space-x-4">
<span class="material-symbols-outlined text-[#00e5ff] text-xl" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<p class="text-[#8e9fb1] text-[0.8125rem] leading-relaxed font-light italic">
                    Access your architectural curriculum with secure encryption. All professional data is protected by industry-standard protocols.
                </p>
</div>
</div>
</main>
<!-- SideNavBar (Suppressed for focused Transactional screen as per 'The Filter' rule, but visual elements kept minimal if needed) -->
<!-- Background Architectural Detail (Subtle Grid or Tone) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-0 right-0 w-1/3 h-full bg-gradient-to-l from-[#181c22] to-transparent opacity-30"></div>
<div class="absolute bottom-20 left-20 w-[600px] h-[600px] bg-[#00e5ff] opacity-[0.03] blur-[120px] rounded-full"></div>
<div class="absolute inset-0" style="background-image: radial-gradient(#3b494c 0.5px, transparent 0.5px); background-size: 40px 40px; opacity: 0.1;"></div>
</div>
</body></html>
